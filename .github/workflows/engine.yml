# Parent-repo CI for the nested engine/ framework. Mirrors engine/.github/workflows/ci.yml
# (which only becomes active after extraction). Scoped to engine/** so live-edition
# work on the parent pipeline never triggers it.
name: engine

on:
  push:
    paths:
      - "engine/**"
      - ".github/workflows/engine.yml"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/engine.yml"

defaults:
  run:
    working-directory: engine

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (with the `it` extra — the suite's binding + integration tests load the real model)
        run: uv sync --extra it

      - name: Tests (full suite — unit + golden + integration, mirrors local)
        run: uv run pytest -q

      - name: No top-level pipeline imports leak into the package
        # _generate_*.py are dev-time golden-fixture generators — the one sanctioned
        # place that imports the live tree (read-only). They are never collected by
        # pytest nor imported by the package, so they are excluded from the gate.
        run: |
          ! grep -rEn --exclude='_generate_*.py' \
            'from (download|ocr|reconcile|triage|cleanup|adjudicate|validate|translate|multi_translate|refine|typeset|companion|pipeline|utils|providers|typography|edgren|hoare|vision_review) import|^[[:space:]]*import (pipeline|utils|providers)$' \
            src tests
